---
type: qemu
config_script: config_mikrotik.py
description: @@DESCRIPTION@@
name: @@DIR-PREFIX@@
cpulimit: 1
icon: Switch-2D-HUB-White-S.svg
cpu: @@NUM_CPU@@
ram: @@RAM@@
qemu_nic: e1000-82545em
ethernet: @@ETHER_PORTS@@
eth_name:
@@INTERFACE_LIST@@
console: telnet
qemu_arch: x86_64
qemu_version: 2.12.0
qemu_options: -machine type=pc,accel=kvm -serial mon:stdio -nographic -no-user-config
  -nodefaults -display none -vga std -rtc base=utc
...
